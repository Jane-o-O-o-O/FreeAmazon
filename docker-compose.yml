services:
  api:
    build:
      context: ./apps/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    command: npm run dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: amazon_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
